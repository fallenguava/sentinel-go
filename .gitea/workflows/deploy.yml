name: Deploy Sentinel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o bin/sentinel ./cmd/sentinel/

      - name: Restart service
        run: sudo systemctl restart sentinel-go
